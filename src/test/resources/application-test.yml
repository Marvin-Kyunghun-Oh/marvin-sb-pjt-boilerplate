# ===================================================================
# Test Profile
# 통합 테스트 시 사용되는 전용 설정입니다.
# ===================================================================

spring:
  config:
    activate:
      on-profile: test

  datasource:
    hikari:
      driver-class-name: org.h2.Driver
      jdbc-url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
      username: sa
      password:

  jpa:
    hibernate:
      ddl-auto: create-drop # 테스트 시 테이블 자동 생성 및 삭제
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        show_sql: true
        format_sql: true

  sql:
    init:
      mode: never # 테스트 시에는 DDL-AUTO를 선호하거나, 필요한 데이터만 직접 삽입

jasypt:
  encryptor:
    password: test-password # 테스트용 고정 키

logging:
  level:
    com.marvin.boiler: DEBUG
