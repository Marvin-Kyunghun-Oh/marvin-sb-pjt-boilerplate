# ===================================================================
# Local Development Profile
# 이 설정은 개발자 개인 PC 환경에서만 적용됩니다.
# ===================================================================

spring:
  config:
    activate:
      # 로컬 profile 식별자 설정 (local/dev/stg/prod)
      on-profile: local

  # Database Connection
  datasource:
    hikari:
      driver-class-name: net.sf.log4jdbc.sql.jdbcapi.DriverSpy
      jdbc-url: jdbc:log4jdbc:h2:mem:boilerdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
      username: ENC(8TAZSwUHur1E+5876zY1sQ==)
      password: ENC(uuLWXjM6J0+HoDO2TgLExsFMjc88Pt7r)

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: none # (create, create-drop, update, validate, none)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        show_sql: false # SQL 출력은 로깅 레벨에서 관리 (DEBUG)

  # H2 Console 설정
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false

  sql:
    init:
      schema-locations: classpath:init-data/schema.sql
      #DataInitializer를 통해 초기데이터 생성
      #data-locations: classpath:init-data/data.sql
      username: ENC(8TAZSwUHur1E+5876zY1sQ==)
      password: ENC(uuLWXjM6J0+HoDO2TgLExsFMjc88Pt7r)
      mode: always
      encoding: UTF-8

jasypt:
  encryptor:
    bean: jasyptEncryptor
    password: ${ENCRYPTION_PASSWORD}

logging:
  level:
    root: INFO
    # 하이버네이트 자체 SQL 로그는 끄고 log4jdbc를 사용합니다.
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF
    # 상세 로깅 설정은 log4j2-spring.xml에서 관리됩니다.

jwt:
  # HS256 알고리즘을 위한 Secret Key (최소 32자 이상의 Base64 문자열 권장)
  secret: dce0ee05ce28a3204de6ccfddbe760364358adbd45d5a9945c270cb0bfcbeda0c0d3b8ab2726a1717e80146c7b1780d75ced2cb7b42f9709347152e5a0183308