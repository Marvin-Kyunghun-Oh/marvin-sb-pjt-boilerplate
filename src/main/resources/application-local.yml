# ===================================================================
# Local Development Profile
# 이 설정은 개발자 개인 PC 환경에서만 적용됩니다.
# ===================================================================

spring:
  config:
    activate:
      # 로컬 profile 식별자 설정 (local/dev/stg/prod)
      on-profile: local

  # Database Connection
  datasource:
    hikari:
      driver-class-name: org.h2.Driver
      jdbc-url: jdbc:h2:mem:boilerdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
      username: ENC(8TAZSwUHur1E+5876zY1sQ==)
      password: ENC(uuLWXjM6J0+HoDO2TgLExsFMjc88Pt7r)

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: none # (create, create-drop, update, validate, none)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        show_sql: false # SQL 출력은 로깅 레벨에서 관리 (DEBUG)

  # H2 Console 설정
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false

  sql:
    init:
      schema-locations: classpath:init-data/schema.sql
      data-locations: classpath:init-data/data.sql
      username: ENC(8TAZSwUHur1E+5876zY1sQ==)
      password: ENC(uuLWXjM6J0+HoDO2TgLExsFMjc88Pt7r)
      mode: always
      encoding: UTF-8

jasypt:
  encryptor:
    bean: jasyptEncryptor
    password: ${ENCRYPTION_PASSWORD}

logging:
  level:
    root: INFO
    com.marvin.boiler: DEBUG
    # HikariCP 로깅 설정
    com.zaxxer.hikari: DEBUG
    com.zaxxer.hikari.HikariConfig: DEBUG
    # JPA 로깅 설정
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE # 쿼리 파라미터 출력 (Hibernate 6)
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE # Hibernate 5 하위 호환