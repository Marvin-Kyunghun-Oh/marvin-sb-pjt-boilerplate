
server:
  # App port
  port: 8080

  # 우아한 종료(Graceful Shutdown) 활성화:
  # 서버 종료 명령(kill)이 떨어졌을 때 수행중이던 요청이 완료된 뒤에 종료.
  # (무중단 배포 시 필수)
  shutdown: graceful

  servlet:
    # API 주소 Prefix
    context-path: /boiler/api

    # HTTP 요청 및 응답 본문(Body)의 인코딩 설정입니다.
    encoding:
      charset: UTF-8
      enabled: true

      # 클라이언트가 다른 인코딩을 요구하더라도, 무조건 서버가 설정한 인코딩 적용.
      force: true

  tomcat:
    # URL에 포함된 파라미터나 한글을 톰캣이 해석할 때 사용할 인코딩 방식입니다.
    uri-encoding: UTF-8

spring:
  application:
    # 현재 애플리케이션의 고유 식별자(이름)입니다.
    # MSA 환경이나, 모니터링 도구에서 서비스 식별자로 쓰입니다.
    name: marvin-sb-pjt-boilerplate

  output:
    ansi:
      # 콘솔 로그의 텍스트 색상 출력 여부를 설정합니다.
      # always: 활성화
      enabled: always

  lifecycle:
    # 우아한 종료(shutdown: graceful)가 발동했을 때,
    # 기존에 처리 중이던 요청이 완료될 때까지
    # 서버가 최대 얼마 동안 기다려줄지 설정합니다.
    timeout-per-shutdown-phase: 20s

  jackson:
    # JSON 응답을 내려줄 때,
    # 값이 null인 변수는 아예 JSON에서 빼버립니다.
    default-property-inclusion: non_null

    deserialization:
      # JSON 요청에 서버 DTO에는 없는 '알 수 없는 필드'가 섞여 있어도,
      # 400 에러를 내지 않고 해당 필드만 무시한 채 정상 처리합니다.
      fail-on-unknown-properties: false

    # JSON으로 날짜/시간 데이터를 변환할 때,
    # 항상 한국 시간(KST)을 기준으로 삼습니다.
    # (DB나 서버 설정과 무관)
    time-zone: Asia/Seoul

  # Global JPA 설정
  jpa:
    open-in-view: false  # OSIV 비활성화 (권장)
    properties:
      hibernate:
        format_sql: true # SQL 가독성을 위한 포맷팅
        jdbc:
          batch_size: 50 # 벌크 insert/update 성능 최적화

  datasource:
    # hikariCP 설정
    hikari:
      pool-name: marvin-pool

      # 풀에 유지할 최대 커넥션 수
      # (기본값: 10)
      maximum-pool-size: 10

      # 커넥션 풀에 연결을 요청할 때 대기할 최대 시간
      # (기본값: 30초)
      minimum-idle: 10

      # 커넥션이 유휴 상태로 풀에 남아있을 수 있는 최대 시간
      # (기본값: 10분)
      connection-timeout: 10000

  # 국제화 설정
  messages:
    basename: i18n/messages,i18n/errors,i18n/validation
    encoding: UTF-8
    fallback-to-system-locale: false # 시스템 언어가 아닌 기본 메시지 파일(messages.properties) 사용
    use-code-as-default-message: true # 해당 키의 메시지가 없다면 디폴트로 설정 (원래라면 NoSuch... 예외 발생)
    cache-duration: 3600s

  # devtool
  devtools:
    restart:
      enabled: true
      exclude: "static/**,public/**" # 정적 파일 변경 시엔 재시작 안 함

# ===================================================================
# SpringDoc (Swagger) 설정
# ===================================================================
springdoc:
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  swagger-ui:
    path: /swagger-ui.html           # Swagger 접속 경로
    disable-swagger-default-url: true # 기본 Swagger URL 비활성화
    display-request-duration: true   # 실행 시간 표시
    operations-sorter: method        # HTTP Method 순으로 정렬
    groups-order: DESC               # 그룹 순서 설정
    tags-sorter: alpha               # 태그(도메인) 가나다 순 정렬
  api-docs:
    path: /v3/api-docs                  # OpenAPI Spec 경로
  cache:
    disabled: true                   # 개발 시 캐시 비활성화 (변경 즉시 반영)

jwt:
  # Access Token 만료 시간: 30분 (단위: ms)
  access-token-expiration: 1800000
  # Refresh Token 만료 시간: 7일 (단위: ms)
  refresh-token-expiration: 604800000