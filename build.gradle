plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.5'
    id 'io.spring.dependency-management' version '1.1.4'
}

group = 'com.franc'
version = '1.0-SNAPSHOT'

// Java 17 사용 설정 (toolchain 방식 권장)
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
    // 기본 로깅(Logback) 제외 및 Log4j2 설정 유지
    all {
        exclude group: 'org.springframework.boot', module: 'spring-boot-starter-logging'
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Web & Validation
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-validation'

    // Logging (Log4j2)
    implementation 'org.springframework.boot:spring-boot-starter-log4j2'

    // DB - MyBatis (Spring Boot 관리 외 버전이므로 명시 필요)
    implementation 'org.mybatis.spring.boot:mybatis-spring-boot-starter:3.0.3'
    implementation 'org.bgee.log4jdbc-log4j2:log4jdbc-log4j2-jdbc4.1:1.16'

    // DB - Driver (실무 환경에 맞게 추가 필요)
    runtimeOnly 'com.h2database:h2'
    // runtimeOnly 'com.mysql:mysql-connector-j' // 예시

    // DevTools
    developmentOnly 'org.springframework.boot:spring-boot-devtools'

    // Lombok (버전 명시 제거 - Spring Boot가 관리)
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // Test
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    // JUnit 5 버전 명시 제거 (Starter Test에 포함됨)

    // Test 시에도 Lombok 사용 가능하도록 설정
    testCompileOnly 'org.projectlombok:lombok'
    testAnnotationProcessor 'org.projectlombok:lombok'
}

tasks.named('test') {
    useJUnitPlatform()
}